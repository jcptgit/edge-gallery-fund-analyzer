<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Analyzer</title>
</head>
<body>
  <script>
    const FMP_BASE = 'https://financialmodelingprep.com/stable';

    // US exchanges that are fully supported on FMP free tier
    const US_EXCHANGES = ['NASDAQ', 'NYSE', 'AMEX', 'CBOE', 'OTC'];

    /**
     * Fetch JSON from FMP API.
     * Returns { data, status } to allow graceful 402 handling.
     */
    async function fmpFetch(endpoint, apiKey) {
      const separator = endpoint.includes('?') ? '&' : '?';
      const url = `${FMP_BASE}${endpoint}${separator}apikey=${apiKey}`;
      console.log(`[FMP] Fetching: ${FMP_BASE}${endpoint}`);
      const res = await fetch(url);
      if (res.status === 402) {
        console.warn(`[FMP] 402 Payment Required for: ${endpoint} — This endpoint requires a paid FMP plan for this symbol. Skipping.`);
        return { data: null, status: 402 };
      }
      if (!res.ok) {
        const errorText = await res.text().catch(() => '');
        console.error(`[FMP] HTTP ${res.status} for: ${endpoint} — ${errorText}`);
        throw new Error(`FMP API error (${res.status}): ${res.statusText}`);
      }
      const data = await res.json();
      console.log(`[FMP] Success for: ${endpoint} — ${Array.isArray(data) ? data.length + ' results' : 'object'}`);
      return { data, status: res.status };
    }

    /**
     * Search for a company by name.
     * Prioritizes US-listed tickers (free tier has more data for them).
     */
    async function searchCompany(query, apiKey) {
      const { data } = await fmpFetch(`/search-name?query=${encodeURIComponent(query)}`, apiKey);
      if (!Array.isArray(data) || data.length === 0) {
        console.warn(`[Search] No results found for query: "${query}"`);
        return null;
      }
      console.log(`[Search] Found ${data.length} results for "${query}". Checking for US-listed tickers...`);

      // Prioritize US exchanges for better free-tier coverage
      const usListed = data.find(r => US_EXCHANGES.includes(r.exchange));
      if (usListed) {
        console.log(`[Search] Selected US-listed: ${usListed.symbol} (${usListed.name}) on ${usListed.exchange}`);
        return usListed;
      }

      // Fallback to first result
      console.log(`[Search] No US listing found. Using first result: ${data[0].symbol} (${data[0].name}) on ${data[0].exchange}`);
      return data[0];
    }

    /**
     * Get real-time stock quote. Returns null on 402.
     */
    async function getQuote(symbol, apiKey) {
      const { data, status } = await fmpFetch(`/quote?symbol=${encodeURIComponent(symbol)}`, apiKey);
      if (status === 402 || !data) {
        console.warn(`[Quote] Not available for ${symbol} (free tier limitation). Will use profile data as fallback.`);
        return null;
      }
      if (Array.isArray(data) && data.length > 0) return data[0];
      return null;
    }

    /**
     * Get detailed company profile.
     */
    async function getProfile(symbol, apiKey) {
      const { data } = await fmpFetch(`/profile?symbol=${encodeURIComponent(symbol)}`, apiKey);
      if (Array.isArray(data) && data.length > 0) return data[0];
      console.warn(`[Profile] No profile data for ${symbol}`);
      return null;
    }

    /**
     * Get income statements. Returns null on 402.
     */
    async function getIncomeStatements(symbol, apiKey) {
      const { data, status } = await fmpFetch(`/income-statement?symbol=${encodeURIComponent(symbol)}&limit=5`, apiKey);
      if (status === 402 || !data) {
        console.warn(`[Income] Not available for ${symbol} (free tier limitation). Report will show profile data only.`);
        return null;
      }
      if (Array.isArray(data) && data.length > 0) return data;
      return null;
    }

    // ==================== FORMATTING HELPERS ====================

    function fmtNum(value) {
      if (value == null || isNaN(value)) return 'N/A';
      return Number(value).toLocaleString('en-US');
    }

    function fmtLargeNum(value, currency) {
      if (value == null || isNaN(value)) return 'N/A';
      const num = Number(value);
      const cur = currency || 'USD';
      let formatted;
      if (Math.abs(num) >= 1e12) formatted = (num / 1e12).toFixed(2) + 'T';
      else if (Math.abs(num) >= 1e9) formatted = (num / 1e9).toFixed(2) + 'B';
      else if (Math.abs(num) >= 1e6) formatted = (num / 1e6).toFixed(2) + 'M';
      else if (Math.abs(num) >= 1e3) formatted = (num / 1e3).toFixed(2) + 'K';
      else formatted = num.toFixed(2);
      return `${cur} ${formatted}`;
    }

    function fmtCurrency(value, currency) {
      if (value == null || isNaN(value)) return 'N/A';
      const cur = currency || 'USD';
      try {
        return Number(value).toLocaleString('en-US', {
          style: 'currency', currency: cur,
          minimumFractionDigits: 2, maximumFractionDigits: 2
        });
      } catch (e) {
        return `${cur} ${Number(value).toFixed(2)}`;
      }
    }

    function pct(value) {
      if (value == null || isNaN(value)) return 'N/A';
      return parseFloat(value).toFixed(2) + '%';
    }

    function margin(part, total) {
      if (part == null || total == null || total === 0) return 'N/A';
      return ((part / total) * 100).toFixed(2) + '%';
    }

    // ==================== REPORT BUILDER ====================

    function buildReport(profile, quote, incomeStatements) {
      let report = '';
      const cur = profile?.currency || quote?.currency || 'USD';
      let sectionsAvailable = [];

      // --- Company Profile ---
      if (profile) {
        sectionsAvailable.push('Profile');
        report += '🏢 COMPANY PROFILE\n';
        report += `• Name: ${profile.companyName || 'N/A'}\n`;
        report += `• Symbol: ${profile.symbol || 'N/A'}\n`;
        report += `• Exchange: ${profile.exchangeShortName || profile.exchange || 'N/A'}\n`;
        report += `• Sector: ${profile.sector || 'N/A'}\n`;
        report += `• Industry: ${profile.industry || 'N/A'}\n`;
        report += `• CEO: ${profile.ceo || 'N/A'}\n`;
        report += `• Employees: ${profile.fullTimeEmployees ? fmtNum(profile.fullTimeEmployees) : 'N/A'}\n`;
        report += `• Country: ${profile.country || 'N/A'}\n`;
        report += `• Website: ${profile.website || 'N/A'}\n`;
        if (profile.isAdr) report += '• Note: This is an ADR (American Depositary Receipt)\n';
        if (profile.description) {
          const desc = profile.description.length > 400
            ? profile.description.substring(0, 400) + '...'
            : profile.description;
          report += `• Description: ${desc}\n`;
        }
        report += '\n';
      }

      // --- Stock Quote (real-time) ---
      if (quote) {
        sectionsAvailable.push('Quote');
        report += '📈 STOCK PRICE & MARKET DATA (Real-time)\n';
        report += `• Price: ${fmtCurrency(quote.price, cur)}\n`;
        report += `• Change: ${fmtCurrency(quote.change, cur)} (${pct(quote.changesPercentage)})\n`;
        report += `• Day Range: ${fmtCurrency(quote.dayLow, cur)} — ${fmtCurrency(quote.dayHigh, cur)}\n`;
        report += `• 52-Week Range: ${fmtCurrency(quote.yearLow, cur)} — ${fmtCurrency(quote.yearHigh, cur)}\n`;
        report += `• Market Cap: ${fmtLargeNum(quote.marketCap, cur)}\n`;
        report += `• Volume: ${fmtNum(quote.volume)}\n`;
        report += `• Avg Volume: ${fmtNum(quote.avgVolume)}\n`;
        report += `• P/E Ratio: ${quote.pe != null ? quote.pe.toFixed(2) : 'N/A'}\n`;
        report += `• EPS: ${fmtCurrency(quote.eps, cur)}\n`;
        if (quote.earningsAnnouncement) {
          report += `• Next Earnings: ${quote.earningsAnnouncement.split('T')[0]}\n`;
        }
        report += '\n';
      } else if (profile) {
        // Fallback: use profile data (less detailed but always available)
        sectionsAvailable.push('Price (from profile)');
        report += '📈 STOCK PRICE & MARKET DATA (From profile)\n';
        report += `• Price: ${fmtCurrency(profile.price, cur)}\n`;
        report += `• Change: ${fmtCurrency(profile.changes || profile.change, cur)} (${pct(profile.changePercentage || profile.changesPercentage)})\n`;
        report += `• 52-Week Range: ${profile.range || 'N/A'}\n`;
        report += `• Market Cap: ${fmtLargeNum(profile.mktCap || profile.marketCap, cur)}\n`;
        report += `• Beta: ${profile.beta != null ? profile.beta.toFixed(3) : 'N/A'}\n`;
        report += `• Avg Volume: ${fmtNum(profile.volAvg || profile.averageVolume)}\n`;
        report += `• Last Dividend: ${fmtCurrency(profile.lastDiv || profile.lastDividend, cur)}\n`;
        report += `• IPO Date: ${profile.ipoDate || 'N/A'}\n`;
        report += '\n';
      }

      // --- Income Statement ---
      if (incomeStatements && incomeStatements.length > 0) {
        const annual = incomeStatements.find(s => s.period === 'FY') || incomeStatements[0];
        if (annual) {
          sectionsAvailable.push('Income Statement');
          const period = annual.calendarYear || annual.fiscalYear
            || (annual.date ? annual.date.split('-')[0] : 'Latest');

          report += `💹 INCOME STATEMENT (${period})\n`;
          report += `• Revenue: ${fmtLargeNum(annual.revenue, cur)}\n`;
          report += `• Cost of Revenue: ${fmtLargeNum(annual.costOfRevenue, cur)}\n`;
          report += `• Gross Profit: ${fmtLargeNum(annual.grossProfit, cur)} (margin: ${margin(annual.grossProfit, annual.revenue)})\n`;
          report += `• Operating Expenses: ${fmtLargeNum(annual.operatingExpenses, cur)}\n`;
          report += `• Operating Income: ${fmtLargeNum(annual.operatingIncome, cur)} (margin: ${margin(annual.operatingIncome, annual.revenue)})\n`;
          report += `• Net Income: ${fmtLargeNum(annual.netIncome, cur)} (margin: ${margin(annual.netIncome, annual.revenue)})\n`;
          report += `• EPS: ${fmtCurrency(annual.eps, cur)}\n`;
          report += `• EPS Diluted: ${fmtCurrency(annual.epsdiluted, cur)}\n`;
          report += `• EBITDA: ${fmtLargeNum(annual.ebitda, cur)}\n`;
          report += `• R&D Expenses: ${fmtLargeNum(annual.researchAndDevelopmentExpenses, cur)}\n`;
          report += '\n';
        }

        // Year-over-year comparison
        if (incomeStatements.length >= 2) {
          const latest = incomeStatements[0];
          const previous = incomeStatements[1];
          if (latest.revenue && previous.revenue) {
            sectionsAvailable.push('YoY Growth');
            const revenueGrowth = ((latest.revenue - previous.revenue) / Math.abs(previous.revenue)) * 100;
            const netIncomeGrowth = (latest.netIncome && previous.netIncome)
              ? ((latest.netIncome - previous.netIncome) / Math.abs(previous.netIncome)) * 100
              : null;

            report += '📊 YEAR-OVER-YEAR GROWTH\n';
            const latestYear = latest.calendarYear || latest.fiscalYear || latest.date?.split('-')[0] || 'Latest';
            const prevYear = previous.calendarYear || previous.fiscalYear || previous.date?.split('-')[0] || 'Previous';
            report += `• Period: ${prevYear} → ${latestYear}\n`;
            report += `• Revenue Growth: ${pct(revenueGrowth)}\n`;
            if (netIncomeGrowth != null) {
              report += `• Net Income Growth: ${pct(netIncomeGrowth)}\n`;
            }
            report += '\n';
          }
        }
      } else {
        report += '💹 INCOME STATEMENT\n';
        report += '• Not available for this company on the free API tier.\n';
        report += '• Upgrade to FMP Starter plan for full financial statements.\n';
        report += '\n';
      }

      // Data availability summary
      report += `ℹ️ Data sections loaded: ${sectionsAvailable.join(', ')}\n`;
      report += '⚠️ Data provided by Financial Modeling Prep. Not financial advice.\n';

      return report;
    }

    /**
     * Determine if the query looks like a ticker symbol.
     */
    function looksLikeTicker(query) {
      return /^[A-Z]{1,5}(\.[A-Z]{1,2})?$/.test(query.trim().toUpperCase());
    }

    // ==================== MAIN ENTRY POINT ====================

    window['ai_edge_gallery_get_result'] = async (data, secret) => {
      try {
        console.log('[CompanyAnalyzer] === Starting analysis ===');
        console.log(`[CompanyAnalyzer] Raw input: ${data}`);

        const jsonData = JSON.parse(data);
        const query = jsonData.query;

        if (!query) {
          console.error('[CompanyAnalyzer] No query provided in input data');
          return JSON.stringify({ error: 'No company name or ticker provided. Please specify a company (e.g., "Apple" or "AAPL").' });
        }

        if (!secret) {
          console.error('[CompanyAnalyzer] No API key (secret) provided');
          return JSON.stringify({ error: 'No API key provided. Please enter your Financial Modeling Prep API key.' });
        }

        console.log(`[CompanyAnalyzer] Query: "${query}"`);
        let symbol = null;

        // If it looks like a ticker, use it directly; otherwise search by name
        if (looksLikeTicker(query)) {
          symbol = query.trim().toUpperCase();
          console.log(`[CompanyAnalyzer] "${query}" looks like a ticker. Using directly: ${symbol}`);
        } else {
          console.log(`[CompanyAnalyzer] "${query}" looks like a company name. Searching...`);
          const searchResult = await searchCompany(query, secret);
          if (!searchResult || !searchResult.symbol) {
            console.error(`[CompanyAnalyzer] Search returned no results for: "${query}"`);
            return JSON.stringify({
              error: `No company found matching "${query}". Try using the ticker symbol directly (e.g., "AAPL" for Apple, "MSFT" for Microsoft, "TEF" for Telefónica, "BBVA" for BBVA).`
            });
          }
          symbol = searchResult.symbol;
          console.log(`[CompanyAnalyzer] Resolved "${query}" → ${symbol} (${searchResult.name})`);
        }

        // Fetch all data in parallel — each handles 402 gracefully
        console.log(`[CompanyAnalyzer] Fetching data for ${symbol} (profile + quote + income-statement)...`);
        const [profile, quote, incomeStatements] = await Promise.all([
          getProfile(symbol, secret),
          getQuote(symbol, secret),
          getIncomeStatements(symbol, secret)
        ]);

        console.log(`[CompanyAnalyzer] Results: profile=${profile ? 'YES' : 'NO'}, quote=${quote ? 'YES' : 'NO'}, income=${incomeStatements ? incomeStatements.length + ' periods' : 'NO'}`);

        if (!profile && !quote) {
          console.error(`[CompanyAnalyzer] No data at all for ${symbol}`);
          return JSON.stringify({
            error: `Could not retrieve data for "${symbol}". The ticker may not be covered by Financial Modeling Prep or may be incorrect. Try the US ticker if available.`
          });
        }

        // Build the report with whatever data is available
        const report = buildReport(profile, quote, incomeStatements);
        console.log(`[CompanyAnalyzer] === Analysis complete for ${symbol} ===`);

        return JSON.stringify({ result: report });

      } catch (e) {
        console.error(`[CompanyAnalyzer] FATAL ERROR: ${e.message}`);
        console.error(`[CompanyAnalyzer] Stack: ${e.stack}`);
        return JSON.stringify({ error: `Company analysis failed: ${e.message}` });
      }
    };
  </script>
</body>
</html>
